<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>

@font-face {
  font-family: "Darwin Serif Regular";
  src: url("fonts/DarwinSerif-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Darwin Serif Regular ALPHA", serif; color:#444; }

.cover-header {
  width:100%;
  background:#dbebff;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 20px;
}

.cover-header h1 {
  color:white;
  font-size:48px;
  text-align:center;
}

.main-content {
  max-width:1200px;
  margin:0 auto;
  padding:30px 0;
}

.header {
  background:white;
  border-radius:10px;
  padding:20px 0;
  margin:0 auto 30px auto;
  max-width:600px;
}

.header h2 {
  color:#add2ff;
  margin-bottom:8px;
}

.description {
  max-width:550px;
  font-size:18px;
  font-weight:bold;
  line-height:1.4;
}

.description a {
  color: #aaa;
  text-decoration: none;
}

.yellow-button {
  font-family:"IBM Plex Sans" !important;
  color: #aaa;
  display:block;        /* makes it full width */
  max-width:200px;           /* fills the description block */
  padding:12px 12px;       /* vertical padding only */
  background:#f0f0f0;   /* yellow */
  border: 3px solid #aaa;
  font-weight:bold;
  text-decoration:none;
  border-radius:6px;
  text-align:center;    /* center text inside button */
  transition: background 0.3s ease;
}


.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  max-width:600px;
  margin:0 auto;
}

.grid-item {
  position:relative;
  padding-top:100%;
  overflow:hidden;
}

.grid-item img {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;

  image-rendering: auto;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  transform: translateZ(0);
}

.bottom-info {

  padding:20px;
  max-width:600px;
  margin:30px auto 0 auto;
}

.bottom-info h3 {
  font-weight:bold;
  font-size:20px;
  color:#333;
  margin-bottom:10px;
}

.bottom-info p {
  font-weight:bold;
  font-size:18px;
  line-height:1.6;
  color:#555;
}

@media (max-width:900px){
  
  .main-content,
  .header,
  .grid,
  .bottom-info {
    padding-left: 15px;
    padding-right: 15px;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .cover-header h1 {
    font-size:28px;
  }
}

</style>
</head>

<body>

<div class="cover-header">
  <h1>Beginning to the End</h1>
</div>

<div class="main-content">

  <div class="header">
    <h2>Nick Bielza</h2>
    <p class="description">
      Style & Pageantry<br><br>
      A curated showcase of my pageantry work as a form of artistic expression, shared through collaboration and memorable experiences.
    </p></br>
    <a href="" class="yellow-button">GIVE ME A COFFEE!</a>
  </div>

  <div class="grid">
    <div class="grid-item"><img src="assets/11.jpg"></div>
    <div class="grid-item"><img src="assets/12.jpg"></div>
    <div class="grid-item"><img src="assets/13.jpg"></div>
    <div class="grid-item"><img src="assets/08.jpg"></div>
    <div class="grid-item"><img src="assets/09.jpg"></div>
    <div class="grid-item"><img src="assets/10.jpg"></div>
    <div class="grid-item"><img src="assets/14.jpg"></div>
    <div class="grid-item"><img src="assets/03.jpg"></div>
    <div class="grid-item"><img src="assets/07.jpg"></div>
  </div>

  <div class="bottom-info">
    <h3>Contact Me</h3>
      <p class="description">
    Business Inquiry Number: <a> (123) 456-7890
</a>
  </p>
  </div>

</div>

</body>
</html>
